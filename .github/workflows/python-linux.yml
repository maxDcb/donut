name: Python Linux

on:
  push:
    paths:
      - ".github/workflows/python-linux.yml"
      - "setup.py"
      - "donut.c"
      - "donutmodule.c"
      - "encrypt.c"
      - "format.c"
      - "hash.c"
      - "include/**"
      - "loader/**"
      - "lib/**"
      - "DonutTest/rundotnet.exe"
      - "ci/python-smoke.py"
  pull_request:
    paths:
      - ".github/workflows/python-linux.yml"
      - "setup.py"
      - "donut.c"
      - "donutmodule.c"
      - "encrypt.c"
      - "format.c"
      - "hash.c"
      - "include/**"
      - "loader/**"
      - "lib/**"
      - "DonutTest/rundotnet.exe"
      - "ci/python-smoke.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and install extension
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip wheel --no-cache-dir . -w dist
          python -m pip install --force-reinstall dist/donut_shellcode-*.whl

      - name: Run smoke test
        run: python -X faulthandler ci/python-smoke.py
