name: MSVC debug loader

on:
  push:
    paths:
      - ".github/workflows/msvc-debug.yml"
      - "Makefile*.msvc"
      - "ci/**"
      - "donut.c"
      - "encrypt.c"
      - "format.c"
      - "hash.c"
      - "include/**"
      - "loader/**"
      - "lib/**"
  pull_request:
    paths:
      - ".github/workflows/msvc-debug.yml"
      - "Makefile*.msvc"
      - "ci/**"
      - "donut.c"
      - "encrypt.c"
      - "format.c"
      - "hash.c"
      - "include/**"
      - "loader/**"
      - "lib/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.target }}
    runs-on: windows-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64
            experimental: false
          - target: x84
            experimental: false
          - target: arm64
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build debug target and run smoke test
        shell: powershell
        run: .\ci\build-test-msvc.ps1 -Target ${{ matrix.target }}

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: donut-${{ matrix.target }}-debug
          path: |
            ci/out/${{ matrix.target }}/
            instance
            loader.bin
            loader.exe
            donut.exe
          if-no-files-found: ignore
